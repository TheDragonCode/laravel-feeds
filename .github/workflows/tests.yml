name: Tests

on:
    pull_request:
    push:

permissions:
    contents: read

jobs:
    validate:
        runs-on: ubuntu-latest

        name: Composer Validate

        steps:
            -   name: Checkout code
                uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1

            -   name: Setup PHP
                uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240
                with:
                    php-version: 8.5
                    coverage: none

            -   name: Validate Composer configuration
                run: composer validate --strict

    benchmark:
        runs-on: ubuntu-24.04
        timeout-minutes: 20

        name: Benchmarks

        steps:
            -   name: Checkout code
                uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
                with:
                    fetch-depth: 0
                    persist-credentials: false

            -   name: Setup PHP
                uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240
                with:
                    php-version: 8.5.8
                    extensions: bcmath, curl, dom, iconv, libxml, mbstring, pdo, pdo_sqlite, zip
                    coverage: none
                    tools: composer:2.10.2

            -   name: Install dependencies
                run: composer update

            -   name: Execute feed generation benchmarks
                env:
                    BENCHMARK_BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
                    BENCHMARK_RESULTS: ${{ runner.temp }}/laravel-feeds-benchmarks
                run: |
                    candidate_sha="$(git rev-parse HEAD)"
                    base_sha="$BENCHMARK_BASE_SHA"

                    if [[ -z "$base_sha" || "$base_sha" == "0000000000000000000000000000000000000000" ]]; then
                        base_sha="$(git rev-parse HEAD^)"
                    fi

                    git cat-file -e "${base_sha}^{commit}"

                    trap 'git restore --source="$candidate_sha" -- src config' EXIT

                    run_benchmark() {
                        git restore --source="$1" -- src config
                        LARAVEL_FEEDS_BENCHMARK_RESULTS="$2" composer test:benchmark
                    }

                    for attempt in 1 2 3 4; do
                        base_results="${BENCHMARK_RESULTS}/base-${attempt}"
                        candidate_results="${BENCHMARK_RESULTS}/candidate-${attempt}"

                        if (( attempt % 2 == 0 )); then
                            run_benchmark "$candidate_sha" "$candidate_results"
                            run_benchmark "$base_sha" "$base_results"
                        else
                            run_benchmark "$base_sha" "$base_results"
                            run_benchmark "$candidate_sha" "$candidate_results"
                        fi
                    done

                    git restore --source="$candidate_sha" -- src config
                    php tests/Benchmark/assert-regression.php "$BENCHMARK_RESULTS" 4

    unit:
        runs-on: ubuntu-latest

        strategy:
            fail-fast: true
            matrix:
                php: [ "8.2", "8.3", "8.4", "8.5" ]
                laravel: [ "11.0", "12.0", "13.0" ]
                exclude:
                    - laravel: "13.0"
                      php: "8.2"

        name: PHP ${{ matrix.php }}, Laravel ${{ matrix.laravel }}

        steps:
            -   name: Checkout code
                uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1

            -   name: Setup PHP
                uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240
                with:
                    php-version: ${{ matrix.php }}
                    extensions: curl, mbstring, zip, pcntl, pdo, pdo_sqlite, iconv
                    coverage: xdebug

            -   name: Install dependencies
                run: composer require --no-blocking --dev laravel/framework:^${{ matrix.laravel }}

            -   name: Execute tests
                run: composer test

    lowest:
        runs-on: ubuntu-latest

        name: Lowest Dependencies

        steps:
            -   name: Checkout code
                uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1

            -   name: Setup PHP
                uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240
                with:
                    php-version: 8.2
                    extensions: curl, mbstring, zip, pcntl, pdo, pdo_sqlite, iconv
                    coverage: none

            -   name: Install lowest supported dependencies
                run: composer update --no-blocking --prefer-lowest --prefer-stable

            -   name: Execute tests
                run: composer test

    type_coverage:
        runs-on: ubuntu-latest

        name: Type Coverage

        steps:
            -   name: Checkout code
                uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1

            -   name: Setup PHP
                uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240
                with:
                    php-version: 8.5
                    extensions: curl, mbstring, zip, pcntl, pdo, pdo_sqlite, iconv
                    coverage: xdebug

            -   name: Install dependencies
                run: composer update --no-blocking

            -   name: Execute tests
                run: composer test:type

    coverage:
        runs-on: ubuntu-latest

        name: Coverage

        steps:
            -   name: Checkout code
                uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1

            -   name: Setup PHP
                uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240
                with:
                    php-version: 8.5
                    extensions: curl, mbstring, zip, pcntl, pdo, pdo_sqlite, iconv
                    coverage: xdebug

            -   name: Install dependencies
                run: composer update --no-blocking

            -   name: Execute tests
                run: composer test:coverage
