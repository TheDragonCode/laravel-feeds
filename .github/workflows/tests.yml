name: Tests

on:
    pull_request:
    push:

permissions:
    contents: read

jobs:
    validate:
        runs-on: ubuntu-latest

        name: Composer Validate

        steps:
            -   name: Checkout code
                uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1

            -   name: Setup PHP
                uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240
                with:
                    php-version: 8.5
                    coverage: none

            -   name: Validate Composer configuration
                run: composer validate --strict

    benchmark:
        runs-on: ubuntu-24.04
        timeout-minutes: 20

        name: Feed Generation Benchmarks

        env:
            BENCHMARK_IMAGE: composer:2.10.2@sha256:5946476338742b200bb9ff88f8be56275ddae4b3949c72305cb0dbf10cfcb760

        steps:
            -   name: Checkout code
                uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
                with:
                    persist-credentials: false

            -   name: Verify benchmark runtime
                run: |
                    test "$(docker run --rm "$BENCHMARK_IMAGE" php -r 'echo PHP_VERSION;')" = "8.5.8"
                    test "$(docker run --rm "$BENCHMARK_IMAGE" composer --version --no-ansi | awk '{print $3}')" = "2.10.2"
                    test "$(docker run --rm "$BENCHMARK_IMAGE" php -r 'echo extension_loaded("xdebug") ? "yes" : "no";')" = "no"

            -   name: Verify regression snapshots
                run: test "$(git ls-files -- '.benchmarks/**/*.snap' | wc -l)" -eq 5

            -   name: Execute feed generation benchmarks
                run: |
                    docker run --rm \
                        --cpus=1 \
                        --memory=1g \
                        --memory-swap=1g \
                        --volume "$GITHUB_WORKSPACE:/app" \
                        --workdir /app \
                        "$BENCHMARK_IMAGE" \
                        sh -lc 'composer install --no-interaction --no-progress --prefer-dist --no-scripts --ignore-platform-req=ext-bcmath && composer clear && composer prepare && composer test:benchmark'

            -   name: Ensure regression snapshots are unchanged
                run: |
                    git diff --exit-code -- .benchmarks
                    test -z "$(git status --porcelain=v1 --untracked-files=all -- .benchmarks)"

    unit:
        runs-on: ubuntu-latest

        strategy:
            fail-fast: true
            matrix:
                php: [ "8.2", "8.3", "8.4", "8.5" ]
                laravel: [ "11.0", "12.0", "13.0" ]
                exclude:
                    - laravel: "13.0"
                      php: "8.2"

        name: PHP ${{ matrix.php }}, Laravel ${{ matrix.laravel }}

        steps:
            -   name: Checkout code
                uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1

            -   name: Setup PHP
                uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240
                with:
                    php-version: ${{ matrix.php }}
                    extensions: curl, mbstring, zip, pcntl, pdo, pdo_sqlite, iconv
                    coverage: xdebug

            -   name: Install dependencies
                run: |
                    composer require --no-update --dev laravel/framework:^${{ matrix.laravel }}
                    composer update --no-blocking

            -   name: Execute tests
                run: composer test

    lowest:
        runs-on: ubuntu-latest

        name: Lowest Dependencies

        steps:
            -   name: Checkout code
                uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1

            -   name: Setup PHP
                uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240
                with:
                    php-version: 8.2
                    extensions: curl, mbstring, zip, pcntl, pdo, pdo_sqlite, iconv
                    coverage: none

            -   name: Install lowest supported dependencies
                run: composer update --no-blocking --prefer-lowest --prefer-stable

            -   name: Execute tests
                run: composer test

    type_coverage:
        runs-on: ubuntu-latest

        name: Type Coverage

        steps:
            -   name: Checkout code
                uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1

            -   name: Setup PHP
                uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240
                with:
                    php-version: 8.5
                    extensions: curl, mbstring, zip, pcntl, pdo, pdo_sqlite, iconv
                    coverage: xdebug

            -   name: Install dependencies
                run: composer update --no-blocking

            -   name: Execute tests
                run: composer test:type

    coverage:
        runs-on: ubuntu-latest

        name: Coverage

        steps:
            -   name: Checkout code
                uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1

            -   name: Setup PHP
                uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240
                with:
                    php-version: 8.5
                    extensions: curl, mbstring, zip, pcntl, pdo, pdo_sqlite, iconv
                    coverage: xdebug

            -   name: Install dependencies
                run: composer update --no-blocking

            -   name: Execute tests
                run: composer test:coverage
